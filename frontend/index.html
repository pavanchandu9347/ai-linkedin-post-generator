<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LinkedIn Post Generator</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🚀 AI LinkedIn Post Generator</h1>
            <p class="subtitle">
                Create professional LinkedIn posts instantly using AI
            </p>

            <div class="form-group">
                <label>Topic / Achievement</label>

                <textarea
                    id="topic"
                    placeholder="Example: Built an AI LinkedIn Post Generator using Flask and OpenAI..."
                ></textarea>

                <small id="counter">0 characters</small>
            </div>

            <div class="form-group">
                <label>Select Tone</label>

                <select id="tone">
                    <option value="Professional">Professional</option>
                    <option value="Inspirational">Inspirational</option>
                    <option value="Casual">Casual</option>
                    <option value="Storytelling">Storytelling</option>
                </select>
            </div>

            <button onclick="generatePost()">
                Generate Post
            </button>

            <div class="result-section">
                <h2>Generated Post</h2>

                <div id="result">
                    Your generated LinkedIn post will appear here...
                </div>

                <button class="copy-btn" onclick="copyPost()">
                    Copy Post
                </button>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
